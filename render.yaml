# Render Blueprint — Arch3 como UM único serviço Node (frontend + API + OpenAI).
# Docs: https://render.com/docs/blueprint-spec
#
# Como usar:
#   1. No Render: New + → Blueprint → conecte este repositório (lê este arquivo).
#   2. Defina OPENAI_API_KEY no painel (secret, NUNCA no repositório).
#   3. (Recomendado) defina ADMIN_EMAIL.
#
# autoDeploy: true => cada push na branch principal redeploya automaticamente.
services:
  - type: web
    name: arch3-site
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      # Secret — preencha no painel do Render (NUNCA commitar a chave).
      - key: OPENAI_API_KEY
        sync: false
      # E-mail do administrador: quem logar com ele vê /admin e a lista de leads.
      - key: ADMIN_EMAIL
        sync: false
      # Segredo para assinar o cookie de sessão (gerado automaticamente).
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1.5
      - key: OPENAI_IMAGE_SIZE
        value: 1536x1024
      # Qualidade da imagem: low | medium | high.
      # medium ≈ $0.05/geração · high ≈ $0.20 · low ≈ $0.013.
      - key: OPENAI_IMAGE_QUALITY
        value: medium
      - key: OPENAI_IMAGE_QUALITY_PRO
        value: high
      # Onde gravar os dados (users/leads/gerações). No plano free o disco é
      # EFÊMERO (some a cada deploy). Para persistir, crie um Render Disk
      # (instância paga), monte em /var/data e troque DATA_DIR para /var/data.
      - key: DATA_DIR
        value: ./data
